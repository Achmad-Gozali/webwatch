name: WebWatch - Auto Monitor

on:
  schedule:
    - cron: '*/5 * * * *' # Tiap 5 menit
  workflow_dispatch: # Bisa dijalankan manual juga

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Ping WebWatch Monitor API
        run: |
          curl -X GET "${{ secrets.VERCEL_URL }}/api/cron/monitor" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail \
            --silent \
            --show-error